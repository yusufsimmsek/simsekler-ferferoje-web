<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 430" role="img" aria-labelledby="title desc">
  <title id="title">Simsekler Muhendislik Logo</title>
  <desc id="desc">Simsekler Muhendislik icin gri disli form, altin C ve tipografiden olusan yerel logo.</desc>
  <defs>
    <mask id="gear-cut">
      <rect width="1600" height="430" fill="black"/>
      <g transform="translate(238 214)" fill="white">
        <circle r="172"/>
        <g id="tooth">
          <rect x="-30" y="-238" width="60" height="88" rx="15"/>
        </g>
        <use href="#tooth"/>
        <use href="#tooth" transform="rotate(45)"/>
        <use href="#tooth" transform="rotate(90)"/>
        <use href="#tooth" transform="rotate(135)"/>
        <use href="#tooth" transform="rotate(180)"/>
        <use href="#tooth" transform="rotate(225)"/>
        <use href="#tooth" transform="rotate(270)"/>
        <use href="#tooth" transform="rotate(315)"/>
      </g>
      <circle cx="238" cy="214" r="106" fill="black"/>
    </mask>
  </defs>

  <rect width="470" height="430" fill="#9c9c9c" mask="url(#gear-cut)"/>

  <path
    d="M 394 82 A 190 190 0 1 0 397 344 L 930 344"
    fill="none"
    stroke="#c3a11a"
    stroke-width="50"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <path
    d="M 358 121 A 141 141 0 1 0 360 304"
    fill="none"
    stroke="#a5a5a5"
    stroke-width="25"
    stroke-linecap="round"
  />

  <text
    x="442"
    y="230"
    fill="#c3a11a"
    stroke="#f7f2df"
    stroke-width="2.2"
    paint-order="stroke fill"
    font-family="Arial Black, Arial, Helvetica, sans-serif"
    font-size="92"
    font-weight="700"
    letter-spacing="5"
  >&#350;&#304;M&#350;EKLER</text>

  <text
    x="1032"
    y="357"
    fill="#a5a5a5"
    stroke="#f2f2f2"
    stroke-width="1.8"
    paint-order="stroke fill"
    font-family="Brush Script MT, Segoe Script, cursive"
    font-size="86"
    font-style="italic"
  >M&#252;hendislik</text>
</svg>
