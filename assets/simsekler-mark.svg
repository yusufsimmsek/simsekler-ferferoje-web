<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 420" role="img" aria-labelledby="title desc">
  <title id="title">Simsekler Muhendislik Marka Isareti</title>
  <desc id="desc">Gri disli form ve altin C sembolunden olusan Simsekler Muhendislik isareti.</desc>
  <defs>
    <mask id="gear-cut">
      <rect width="620" height="420" fill="black"/>
      <g transform="translate(212 210)" fill="white">
        <circle r="165"/>
        <g id="tooth">
          <rect x="-28" y="-228" width="56" height="82" rx="14"/>
        </g>
        <use href="#tooth"/>
        <use href="#tooth" transform="rotate(45)"/>
        <use href="#tooth" transform="rotate(90)"/>
        <use href="#tooth" transform="rotate(135)"/>
        <use href="#tooth" transform="rotate(180)"/>
        <use href="#tooth" transform="rotate(225)"/>
        <use href="#tooth" transform="rotate(270)"/>
        <use href="#tooth" transform="rotate(315)"/>
      </g>
      <circle cx="212" cy="210" r="102" fill="black"/>
